name: Bug report
description: Create a report to help us improve
title: "<title>"
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Please check the existing issues first to see if the bug has already been recorded.
        If you have more information about an existing bug, please add it as a comment and don't open a new issue.
        Thank you!
  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: How to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: consistent
    attributes:
      label: Is the issue consistent?
      description: Is the issue always reproducible when following the steps above, or does it only happen sometimes?
      options:
        - Always
        - Sometimes
    validations:
      required: false
  - type: textarea
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: intg_version
    attributes:
      label: Integration version
      description: You can find the integration version in driver.json or in the UI under Settings/Integrations
      placeholder: ex. v0.4.5
    validations:
      required: true
  - type: input
    id: manufacturer_model
    attributes:
      label: Manufacturer and model
      description: Specify the manufacturer and model of the Blu-ray player.
      placeholder: Oppo UDP-203
    validations:
      required: true
  - type: dropdown
    id: single_connection
    attributes:
      label: Anything else connected to the player?
      description: The players only support a single connection. If you have anything else connected to the player, it can cause issues.
      options:
          - Yes
          - No
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: |
        Add any other context about the problem here. Please also attach logs for captured when the issue occurs.
        You can find logs in the UI under Settings/Development/Logs. Ensure that you download logs for Core and the integration with Debug level.

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: true
